</head>
<body class="login-page-body">
    <header id="main-header">
            
        <div class="nav-container">
            <a href="/index.html#home" class="nav-logo-link">
                <img src="/img/logo.png" alt="BMS Logo" class="nav-left-logo">

            <ul class="nav-menu" id="nav-menu">

                <li class="nav-item" data-sec="clients"><a href="/Clients">Clients</a></li>
                <li class="nav-item" data-sec="about"><a href="/index.html#about">About Us</a></li>
                <li class="nav-item" data-sec="contact"><a href="/index.html#contact">Contact</a></li>
            </ul>


            <div class="nav-actions">
                <a href="/index.html#contact" target="_self" class="nav-icon" id="call-action-btn" title="Call Us">
                    <svg viewBox="0 0 24 24">
                        <path d="M6.62,10.79C8.06,13.62 10.38,15.93 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/>
                    </svg>

                <a href="/Login" target="_self" class="nav-icon" id="profile-action-btn" title="Client Portal">
                    <svg viewBox="0 0 24 24">
                        <path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/>
                    </svg>
                </a>

                <div class="nav-actions">
    <button class="nav-icon" id="theme-toggle-btn" title="Toggle Light/Dark Mode" style="background:none; border:none; padding:0;">
        <svg viewBox="0 0 24 24" class="theme-icon-dark" style="display: block;">
            <path d="M12,18C11.11,18 10.26,17.8 9.5,17.45C11.56,16.5 13,14.42 13,12C13,9.58 11.56,7.5 9.5,6.55C10.26,6.2 11.11,6 12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18M20,8.69V4H15.31L12,0.69L8.69,4H4V8.69L0.69,12L4,15.31V20H8.69L12,23.31L15.31,20H20V15.31L23.31,12L20,8.69Z" />
        </svg>
    </button>

                <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Navigation">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>


    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="/img/bmslogo.png" alt="BMS Logo" class="login-logo" onerror="this.style.display='none'">
                <h2>Welcome</h2>
                <p>Access the BMS Enterprise Management Platform</p>
            </div>
           
            <form id="bms-login-form" class="login-form">
                <div class="form-group-login">
                    <label for="login-email">Corporate Email Address</label>
                    <input type="email" id="login-email" placeholder="name@company.com" required>
                </div>
               
                <div class="form-group-login">
                    <div class="label-row-login">
                        <label for="login-password">Password</label>
                        <a href="#" class="forgot-pass-link">Forgot Password?</a>
                    </div>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>


               
                <div class="remember-me-container">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Keep me logged in for 30 days</label>
                </div>


                <button type="submit" class="btn-login-submit">Sign In</button>
            </form>
           
            <div class="login-footer">
                <p>Authorized access only. Need system credentials? <a href="/index.html#contact">Contact Support</a></p>
            </div>
        </div>
    </div>
<button id="theme-toggle-btn" aria-label="Toggle Theme" style="background: none; border: none; cursor: pointer; padding: 8px; color: inherit; display: inline-flex; align-items: center; justify-content: center;">
  </button>
      <script>
        
  // Instant, non-blocking check to apply theme before document rendering starts
  (function() {
      const activeTheme = localStorage.getItem("bms_site_theme");
      if (activeTheme === "light") {
          document.documentElement.classList.add("light-theme");
          document.body.classList.add("light-theme");
      } else {
          document.documentElement.classList.remove("light-theme");
          document.body.classList.remove("light-theme");
      }
  })();

    </script>

    <!-- Reusing your unified JavaScript controller logic -->
    <script src="/script.js"></script>
</body>
</html>
